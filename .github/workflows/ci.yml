name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jobtracker
          POSTGRES_PASSWORD: jobtracker_password
          POSTGRES_DB: peepss_security_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U jobtracker"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      # Points at the CI-only Postgres service above. Not a secret, not a
      # real database, and never Neon/production — this is exactly what
      # security.test.ts's own safety check requires before it will run.
      TEST_DATABASE_URL: postgresql://jobtracker:jobtracker_password@localhost:5432/peepss_security_test?schema=public
      JWT_SECRET: ci-only-test-secret-not-used-anywhere-real
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: back/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations to the CI test database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Build
        run: npm run build

      - name: Security + integration tests
        run: npm run test:security

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
